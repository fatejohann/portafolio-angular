[build]
  command   = "npm run build"
  publish   = "dist/portafolio-angular/browser"

[build.environment]
  NODE_VERSION = "22"

# Redirige todas las rutas al index.html para que Angular
# maneje la navegación en el cliente (SPA redirect)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
