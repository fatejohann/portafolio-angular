<section id="stack" aria-label="Stack técnico">
  <div class="section-header">
    <span class="section-num">02</span>
    <h2 class="section-title">Stack técnico</h2>
    <span class="section-tag">Tecnologías que domino</span>
  </div>

  <div class="stack-grid">
    @for (col of columns; track col.label) {
      <div class="stack-col" appScrollReveal>
        <div class="stack-col-label">{{ col.label }}</div>
        <div class="stack-tags">
          @for (tag of col.tags; track tag.label) {
            <span class="stack-tag" [class.stack-tag-highlight]="tag.highlight">{{ tag.label }}</span>
          }
        </div>
      </div>
    }
  </div>
</section>
